scrape_configs:
  - job_name: "pve"
    static_configs:
      - targets:
          - pve01.brokeserver.live # Proxmox VE node.
          - pve02.brokeserver.live # Proxmox VE node.
    metrics_path: /pve
    params:
      module: [default]
      cluster: ["1"]
      node: ["1"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: docker.brokeserver.live:9221 # PVE exporter.
